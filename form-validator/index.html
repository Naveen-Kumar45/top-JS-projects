<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Form Validator</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="form.css">
        <script src="form.js" defer></script>
    </head>
    <body>
        <!-- Caption: index.html — Main workshop registration form UI. Contains form fields and hooks into `form.js` for validation and submission. Uses `form.css` for styling. (No captions added inside <head> per request) -->
        <div class="page-container">
            <form class="form-card" id="formContainer">
                
                <h2 class="form-title">Workshop Registration</h2>

                <div class="form-field">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="Enter your full name"/>
                    <small class="error-message" id="nameError"></small>
                </div>

                <div class="form-field">
                    <label for="email" class="form-label">Email</label>
                    <input type="text" id="email" class="form-input" placeholder="Enter your email address"/>
                    <small class="error-message" id="emailError"></small>
                </div>

                <div class="form-field">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" id="age" class="form-input" placeholder="Enter your age"/>
                    <small class="error-message" id="ageError"></small>
                </div>

                <div class="form-field">
                    <label class="form-label">Gender</label>
                    <div class="radio-group d-flex flex-row gap-3">
                        <div class="radio-item">
                            <input type="radio" id="male" name="gender" value="male" class="radio-input" checked>
                            <label for="male" class="radio-text">Male</label>
                        </div>

                        <div class="radio-item">
                            <input type="radio" id="female" name="gender" value="female" class="radio-input">
                            <label for="female" class="radio-text">Female</label>
                        </div>

                    </div>
                </div>

                <div class="form-field">
                    <label for="phone" class="form-label">Contact Number</label>
                    <input type="text" id="phone" class="form-input" placeholder="xxxxxxxxxx">
                    <small class="error-message" id="phoneError"></small>
                </div>

                <div class="form-field">
                    <label for="topic" class="form-label">Select Workshop Topic</label>
                    <select id="topic" class="form-select">
                        <option value="">-- Choose a Topic --</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Data Analytics">Data Analytics</option>
                        <option value="AI & Machine Learning">AI & Machine Learning</option>
                        <option value="Cyber Security">Cyber Security</option>
                    </select>
                    <small class="error-message" id="topicError"></small>
                </div>

                <button type="submit" class="submit-button">Submit</button>

                <div class="spinner-container" id="spinnerContainer">
                    <div class="spinner-border" role = "status" id = "LoadingSpinner">

                    </div>
                </div>

                <p class="success-message" id="successMessage">
                    Successfully Registered ✅
                </p>

                <div class="view-link-container">
                    <a href="applications.html" id="viewApplications" class="view-link">View Applications</a>
                </div>

            </form>


        </div>

    </body>
</html>
