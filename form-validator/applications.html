<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Applications</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="application.css">
        <script src="applications.js" defer></script>
    </head>
    <body>
        <!-- Caption: applications.html — Shows submitted applications from localStorage in a table. Uses `application.css` for layout and `applications.js` to render data and handle clearing. (No captions added inside <head> per request) -->
        <div class="table-container">
            <h2>Submitted Applications</h2>
            <table id="applicationsTable">  
                <thead>
                    <tr>
                        <th>Serial No.</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Phone</th>
                        <th>Topic</th>
                    </tr>
                </thead>
                <tbody id="tableBody">

                </tbody>
            </table>
            <a href="index.html" class="back-link">← Back to Form</a>

            <button id="clearBtn" class="clear-btn">Clear All Applications</button>
        </div>

</body>
</html>
