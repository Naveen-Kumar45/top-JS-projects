<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Github Profile Finder</title>
        <!-- Bootstrap CSS for responsive design and pre-built components -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- Bootstrap JS and Popper for interactive components -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <!-- FontAwesome for icons like the search magnifying glass -->
        <script src="https://kit.fontawesome.com/4a7352cead.js" crossorigin="anonymous"></script>
        <link rel = "stylesheet" href = "style.css">
        <!-- Main JavaScript file for app functionality, loaded with defer to run after HTML parsing -->
        <script src = "project.js" defer></script>
    </head>
    <body>
        <!-- Main search container with input field and search button -->
        <div class="search-container">
            <div class="search-box">
                <input type="search" id="userName" placeholder="Enter GitHub username..."autocomplete="off"/>
                <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <!-- Dropdown list for displaying user suggestions based on input -->
            <ul id="suggestions" class="suggestions-list"></ul>
        </div>
        
        <!-- Container for displaying the selected user's profile information -->
        <div id="profile" class="profile-container">

            <!-- Loading spinner shown while fetching profile data -->
            <div id="profileSpinner" class="text-center d-none">
                <div class="spinner-border" role="status"></div>
            </div>

            <!-- Area where profile details (avatar, name, bio, etc.) are displayed -->
            <div id="profileContent"></div>

        </div>

        <!-- Container for displaying the user's repositories -->
        <div id="reposContainer" class="repos">

            <!-- Loading spinner shown while fetching repository data -->
            <div id="reposSpinner" class="text-center d-none">
                <div class="spinner-border" role="status"></div>
            </div>

            <!-- Area where repository list is displayed -->
            <div id="reposContent">
            </div>

        </div>
    </body>
</html>
