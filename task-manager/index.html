<!DOCTYPE html>
<!-- This is the main HTML file for the Task Manager application.
   It defines the structure of the web page, including the title, input field for new tasks,
   buttons for adding, saving, and clearing tasks, and a list to display tasks.
   It links to external libraries (Bootstrap, Tailwind CSS, FontAwesome) for styling and icons,
   and includes the custom CSS (task.css) and JavaScript (task.js) files. -->
<html>
    <head>
        <!-- Meta tags for character encoding and responsive design -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Task Manager</title>
        <!-- External CSS and JS libraries for styling and functionality -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <script src="https://kit.fontawesome.com/4a7352cead.js" crossorigin="anonymous"></script>
        <script src="https://cdn.tailwindcss.com"></script>        
        <link rel="stylesheet" href="task.css"/>
        <script src="task.js" defer></script>
    </head>
    <body>
        <!-- Main container with background and centered content -->
        <div class="bg-container">
            <!-- Application title -->
            <h1 class="title">Task Tracker</h1>
            <!-- Input section for adding new tasks -->
            <div class="input-style d-flex justify-content-center">
                <input type="text" id="taskInput" class="form-control task-input" placeholder="Enter a new task">
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
            <!-- Heading for the tasks list -->
            <h2 class="tasks-heading">MY TASKS</h2>
            <!-- Unordered list where tasks will be dynamically added by JavaScript -->
            <ul class="task-list" id="taskList">
                <!-- Task items will be dynamically added here by JavaScript-->
            </ul>
            <!-- Buttons for saving and clearing tasks -->
            <div class="btn-container ">
                <button id="saveBtn" class="save-btn me-3">Save Tasks</button>
                <button id="clearBtn" class="clear-btn">Clear All Tasks</button>
            </div>

        </div>
    </body>
</html>
